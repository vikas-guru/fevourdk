<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FEVOURD-K Offline</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
            color: #ffffff;
            font-family: Inter, Arial, sans-serif;
            padding: 24px;
            box-sizing: border-box;
        }
        .card {
            width: min(480px, 100%);
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 18px;
            padding: 22px;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        h1 { margin: 0 0 10px; font-size: 24px; }
        p { margin: 0 0 16px; line-height: 1.5; opacity: 0.95; }
        button {
            border: 0;
            border-radius: 10px;
            background: #ffffff;
            color: #1e3a8a;
            padding: 10px 16px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>You are offline</h1>
    <p>FEVOURD-K cannot reach the internet right now. Reconnect and retry to continue your social impact work.</p>
    <button onclick="window.location.reload()">Try again</button>
</main>
</body>
</html>
