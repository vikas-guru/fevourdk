<!DOCTYPE html>
<html lang="en">
<head>

    <title>Navigation Test - FEVOURD-K</title>

</head>
<body>
    <div id="app">
        <h1>Navigation Test</h1>
        <a href="/login" onclick="console.log('Login clicked')">Login</a> |

                    message: 'Navigation test loaded'
                }
            }
        }).mount('#app');
