<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Lower-third template">
  <!-- Transparent canvas: only the lower-third graphics are drawn. -->
  <defs>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- SECTION CHIP (left). Swap the number + label per section. -->
  <g transform="translate(96,912)" filter="url(#ds)">
    <rect x="0" y="0" width="560" height="96" rx="16" fill="url(#chip)"/>
    <!-- orange section-number tile -->
    <rect x="0" y="0" width="96" height="96" rx="16" fill="#f97316"/>
    <rect x="80" y="0" width="16" height="96" fill="#f97316"/>
    <text x="48" y="64" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">&#9315;</text>
    <text x="124" y="42" font-family="Helvetica, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#dbeafe">WORKFLOW</text>
    <text x="124" y="76" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Finance Claim</text>
  </g>

  <!-- PERSISTENT TAG (right) -->
  <g transform="translate(1216,940)" filter="url(#ds)">
    <rect x="0" y="0" width="608" height="56" rx="28" fill="#0f172a" fill-opacity="0.82" stroke="#2563eb" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="34" cy="28" r="7" fill="#f97316"/>
    <text x="58" y="36" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#cbd5e1">Fevourd-K = system of record <tspan fill="#64748b">&#183;</tspan> UiPath = agentic layer</text>
  </g>
</svg>